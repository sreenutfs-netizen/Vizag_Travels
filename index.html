<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vizag Tours & Travels - Booking System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #1a1a2e 100%);
            min-height: 100vh;
            padding: 0;
            overflow-x: hidden;
        }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #5a4a8a 100%);
            color: white;
            padding: 25px 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3), 0 0 60px rgba(102, 126, 234, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .nav-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            margin: 0;
            font-family: 'Playfair Display', serif;
            letter-spacing: -1px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .nav-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.4s;
            z-index: -1;
        }

        .nav-btn:hover::before,
        .nav-btn.active::before {
            left: 0;
        }

        .nav-btn:hover,
        .nav-btn.active {
            background: white;
            color: #667eea;
            border-color: white;
            font-weight: 700;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            transform: translateY(-3px);
        }

        /* Main Content */
        main {
            flex: 1;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 50px 20px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            padding: 50px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.15), 
                        0 0 120px rgba(102, 126, 234, 0.1),
                        inset 0 1px 0 rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        h2 {
            color: #667eea;
            margin-bottom: 40px;
            text-align: center;
            font-size: 42px;
            font-weight: 800;
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        h3 {
            color: #333;
            margin: 30px 0 20px;
            font-size: 24px;
            font-weight: 700;
            font-family: 'Playfair Display', serif;
        }

        h4 {
            margin: 15px 0 8px;
            color: #333;
            font-size: 18px;
            font-weight: 700;
        }

        /* Forms */
        .form-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group.full {
            grid-template-columns: 1fr;
        }

        label {
            display: flex;
            flex-direction: column;
            font-weight: 600;
            color: #555;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input,
        select {
            padding: 16px 18px;
            border: 2px solid #e8e8f0;
            border-radius: 12px;
            font-size: 15px;
            margin-top: 8px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: 'Poppins', sans-serif;
            background: #f8f9fb;
            color: #333;
            font-weight: 500;
        }

        input::placeholder {
            color: #bbb;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1),
                        0 8px 20px rgba(102, 126, 234, 0.2);
            transform: translateY(-2px);
        }

        .cab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
            margin: 30px 0 40px;
        }

        .cab-card {
            border: 2px solid #e8e8f0;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: linear-gradient(135deg, #f8f9fb 0%, #f0f4ff 100%);
            position: relative;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
        }

        .cab-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.1) 0%, transparent 70%);
            transition: all 0.4s;
        }

        .cab-card:hover {
            border-color: #667eea;
            box-shadow: 0 20px 50px rgba(102, 126, 234, 0.25),
                        0 0 40px rgba(102, 126, 234, 0.15);
            transform: translateY(-10px) scale(1.02);
            border-radius: 25px;
        }

        .cab-card.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 20px 60px rgba(102, 126, 234, 0.35);
            transform: translateY(-10px) scale(1.05);
        }

        .cab-card.selected h4,
        .cab-card.selected p {
            color: white;
        }

        .cab-icon {
            font-size: 60px;
            margin-bottom: 15px;
            transition: all 0.4s;
        }

        .cab-card:hover .cab-icon {
            transform: scale(1.15) rotate(5deg);
        }

        .cab-card h4 {
            margin: 15px 0 10px;
            color: #333;
            font-size: 20px;
        }

        .cab-card p {
            margin: 8px 0;
            color: #888;
            font-size: 14px;
            font-weight: 500;
        }

        .price-highlight {
            margin-top: 15px;
            color: #667eea;
            font-weight: 700;
            font-size: 18px;
            background: rgba(102, 126, 234, 0.1);
            padding: 12px;
            border-radius: 12px;
            transition: all 0.3s;
        }

        .cab-card.selected .price-highlight {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
        }

        .btn {
            padding: 16px 40px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            transition: left 0.5s;
            z-index: 0;
        }

        .btn span {
            position: relative;
            z-index: 1;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 50px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #f0f4ff;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
            transform: translateY(-4px);
            box-shadow: 0 20px 50px rgba(102, 126, 234, 0.3);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
        }

        .btn-update {
            background: #2196f3;
            color: white;
        }

        .btn-delete {
            background: #f44336;
            color: white;
        }

        /* Messages */
        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
        }

        .message.success {
            background: #4caf50;
            color: white;
        }

        .message.error {
            background: #f44336;
            color: white;
        }

        /* Admin Table */
        .bookings-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .bookings-table th,
        .bookings-table td {
            border: 1px solid #e8e8f0;
            padding: 18px;
            text-align: left;
            font-size: 14px;
            font-weight: 500;
        }

        .bookings-table th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 13px;
        }

        .bookings-table tbody tr {
            transition: all 0.3s ease;
            border-bottom: 2px solid #f0f0f0;
        }

        .bookings-table tbody tr:hover {
            background: #f8f9fb;
            box-shadow: inset 0 0 10px rgba(102, 126, 234, 0.05);
        }

        .bookings-table td strong {
            color: #667eea;
            font-weight: 700;
        }

        .status-select {
            padding: 4px;
            border: 1px solid #ddd;
            border-radius: 3px;
        }

        /* Statistics */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 35px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.25);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .stat-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 25px 60px rgba(102, 126, 234, 0.35);
        }

        .stat-card h4 {
            margin: 0 0 12px;
            font-size: 15px;
            opacity: 0.95;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .stat-card .number {
            font-size: 48px;
            font-weight: 800;
            font-family: 'Playfair Display', serif;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state p {
            font-size: 18px;
            margin: 0;
        }

        /* Footer */
        .footer {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            text-align: center;
            padding: 30px 20px;
            margin-top: auto;
            border-top: 2px solid rgba(102, 126, 234, 0.2);
        }

        .footer p {
            font-size: 14px;
            font-weight: 500;
            opacity: 0.9;
            letter-spacing: 0.5px;
        }

        /* WhatsApp Button */
        .whatsapp-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, #25D366 0%, #20BA58 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(37, 211, 102, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 50;
            border: 3px solid white;
            font-size: 32px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 8px 30px rgba(37, 211, 102, 0.3);
            }
            50% {
                box-shadow: 0 8px 50px rgba(37, 211, 102, 0.5);
            }
        }

        .whatsapp-btn:hover {
            transform: scale(1.15) rotate(-10deg);
            box-shadow: 0 15px 50px rgba(37, 211, 102, 0.5);
        }

        .whatsapp-btn:active {
            transform: scale(1.08);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .form-group {
                grid-template-columns: 1fr;
            }

            .nav-content {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .cab-grid {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            main {
                padding: 20px 10px;
            }

            .card {
                padding: 20px;
            }

            .bookings-table {
                font-size: 12px;
            }

            .bookings-table th,
            .bookings-table td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="nav-content">
                <h1 class="logo">🚌 Vizag Tours & Travels</h1>
                <div class="nav-buttons">
                    <button class="nav-btn active" onclick="showPage('booking')">Book a Cab</button>
                    <button class="nav-btn" onclick="showPage('admin')">Admin Panel</button>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main>
            <!-- Booking Page -->
            <div id="booking" class="page active">
                <div class="card">
                    <h2>📍 Book Your Vizag Tour Cab</h2>
                    <div id="bookingMessage"></div>

                    <form id="bookingForm" onsubmit="submitBooking(event)">
                        <div class="form-group">
                            <label>
                                Full Name
                                <input type="text" name="name" placeholder="John Doe" required>
                            </label>
                            <label>
                                Email
                                <input type="email" name="email" placeholder="john@example.com" required>
                            </label>
                        </div>

                        <div class="form-group">
                            <label>
                                Phone Number
                                <input type="tel" name="phone" placeholder="+91 9876543210" required>
                            </label>
                            <label>
                                Date
                                <input type="date" name="date" required>
                            </label>
                        </div>

                        <div class="form-group">
                            <label>
                                Pickup Location
                                <input type="text" name="pickupLocation" placeholder="e.g., Railway Station, Hotel" required>
                            </label>
                            <label>
                                Drop Location
                                <input type="text" name="dropLocation" placeholder="e.g., Vizag Beach, Araku Valley" required>
                            </label>
                        </div>

                        <div class="form-group">
                            <label>
                                Number of Passengers
                                <input type="number" name="passengers" value="1" min="1" required>
                            </label>
                        </div>

                        <h3>🚗 Select Your Cab</h3>
                        <div class="cab-grid" id="cabGrid"></div>

                        <div class="button-group">
                            <button type="submit" class="btn btn-primary">💳 Book Now</button>
                            <button type="reset" class="btn btn-secondary" onclick="resetBookingForm()">Clear Form</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Admin Panel -->
            <div id="admin" class="page">
                <div class="card">
                    <h2>📊 Admin Dashboard</h2>
                    <div id="adminMessage"></div>

                    <div class="stats-grid" id="statsGrid"></div>

                    <h3>All Cab Bookings</h3>
                    <div id="bookingsContainer"></div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 Vizag Tours & Travels. All rights reserved.</p>
        </footer>
    </div>

    <script>
        // Initialize data
        const CABS = [
            { id: 1, name: 'Innova', capacity: 6, pricePerKm: 12, image: '🚌' },
            { id: 2, name: 'Toyota Fortuner', capacity: 7, pricePerKm: 15, image: '🚐' },
            { id: 3, name: 'Sedan', capacity: 4, pricePerKm: 8, image: '🚗' },
            { id: 4, name: 'Premium SUV', capacity: 5, pricePerKm: 18, image: '🏎️' }
        ];

        let selectedCab = null;
        let bookings = JSON.parse(localStorage.getItem('bookings')) || [];

        // Initialize app
        function initApp() {
            renderCabs();
            renderBookings();
        }

        // Render cabs
        function renderCabs() {
            const cabGrid = document.getElementById('cabGrid');
            cabGrid.innerHTML = CABS.map(cab => `
                <div class="cab-card ${selectedCab?.id === cab.id ? 'selected' : ''}" 
                     onclick="selectCab(${cab.id})">
                    <div class="cab-icon">${cab.image}</div>
                    <h4>${cab.name}</h4>
                    <p>👥 Capacity: ${cab.capacity} passengers</p>
                    <p>₹${cab.pricePerKm}/km</p>
                    <div class="price-highlight">≈ ₹${cab.pricePerKm * 10} (estimated)</div>
                </div>
            `).join('');
        }

        // Select cab
        function selectCab(cabId) {
            selectedCab = CABS.find(c => c.id === cabId);
            renderCabs();
        }

        // Submit booking
        function submitBooking(event) {
            event.preventDefault();

            if (!selectedCab) {
                showMessage('bookingMessage', 'Please select a cab', 'error');
                return;
            }

            const formData = new FormData(event.target);
            const booking = {
                id: 'BK' + Date.now(),
                name: formData.get('name'),
                email: formData.get('email'),
                phone: formData.get('phone'),
                pickupLocation: formData.get('pickupLocation'),
                dropLocation: formData.get('dropLocation'),
                date: formData.get('date'),
                passengers: formData.get('passengers'),
                cabId: selectedCab.id,
                cabName: selectedCab.name,
                totalPrice: selectedCab.pricePerKm * 10,
                status: 'pending',
                createdAt: new Date().toISOString()
            };

            bookings.push(booking);
            localStorage.setItem('bookings', JSON.stringify(bookings));

            showMessage('bookingMessage', `✅ Booking Confirmed! Your Booking ID: ${booking.id}`, 'success');
            resetBookingForm();
            renderBookings();

            setTimeout(() => {
                document.getElementById('bookingMessage').innerHTML = '';
            }, 5000);
        }

        // Reset form
        function resetBookingForm() {
            document.getElementById('bookingForm').reset();
            selectedCab = null;
            renderCabs();
        }

        // Render bookings for admin
        function renderBookings() {
            const container = document.getElementById('bookingsContainer');
            const statsGrid = document.getElementById('statsGrid');

            // Calculate stats
            const stats = {
                total: bookings.length,
                pending: bookings.filter(b => b.status === 'pending').length,
                confirmed: bookings.filter(b => b.status === 'confirmed').length,
                completed: bookings.filter(b => b.status === 'completed').length
            };

            // Render stats
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <h4>Total Bookings</h4>
                    <div class="number">${stats.total}</div>
                </div>
                <div class="stat-card">
                    <h4>Pending</h4>
                    <div class="number">${stats.pending}</div>
                </div>
                <div class="stat-card">
                    <h4>Confirmed</h4>
                    <div class="number">${stats.confirmed}</div>
                </div>
                <div class="stat-card">
                    <h4>Completed</h4>
                    <div class="number">${stats.completed}</div>
                </div>
            `;

            // Render bookings table
            if (bookings.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No bookings yet. 🚗</p></div>';
            } else {
                container.innerHTML = `
                    <table class="bookings-table">
                        <thead>
                            <tr>
                                <th>Booking ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Cab</th>
                                <th>Date</th>
                                <th>Passengers</th>
                                <th>Price (₹)</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${bookings.map(booking => `
                                <tr>
                                    <td><strong>${booking.id}</strong></td>
                                    <td>${booking.name}</td>
                                    <td>${booking.email}</td>
                                    <td>${booking.phone}</td>
                                    <td>${booking.cabName}</td>
                                    <td>${new Date(booking.date).toLocaleDateString()}</td>
                                    <td>${booking.passengers}</td>
                                    <td>₹${booking.totalPrice}</td>
                                    <td>
                                        <select class="status-select" onchange="updateStatus('${booking.id}', this.value)">
                                            <option value="pending" ${booking.status === 'pending' ? 'selected' : ''}>Pending</option>
                                            <option value="confirmed" ${booking.status === 'confirmed' ? 'selected' : ''}>Confirmed</option>
                                            <option value="completed" ${booking.status === 'completed' ? 'selected' : ''}>Completed</option>
                                            <option value="cancelled" ${booking.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
                                        </select>
                                    </td>
                                    <td>
                                        <button class="btn btn-sm btn-delete" onclick="deleteBooking('${booking.id}')">Delete</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            }
        }

        // Update booking status
        function updateStatus(bookingId, newStatus) {
            const booking = bookings.find(b => b.id === bookingId);
            if (booking) {
                booking.status = newStatus;
                localStorage.setItem('bookings', JSON.stringify(bookings));
                showMessage('adminMessage', '✅ Booking status updated', 'success');
                renderBookings();
                setTimeout(() => {
                    document.getElementById('adminMessage').innerHTML = '';
                }, 3000);
            }
        }

        // Delete booking
        function deleteBooking(bookingId) {
            if (confirm('Are you sure you want to delete this booking?')) {
                bookings = bookings.filter(b => b.id !== bookingId);
                localStorage.setItem('bookings', JSON.stringify(bookings));
                showMessage('adminMessage', '✅ Booking deleted', 'success');
                renderBookings();
                setTimeout(() => {
                    document.getElementById('adminMessage').innerHTML = '';
                }, 3000);
            }
        }

        // Show page
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            event.target.classList.add('active');
        }

        // Show message
        function showMessage(elementId, text, type) {
            const element = document.getElementById(elementId);
            element.innerHTML = `<div class="message ${type}">${text}</div>`;
        }

        // Initialize on page load
        window.addEventListener('load', initApp);
    </script>
</body>
</html>
